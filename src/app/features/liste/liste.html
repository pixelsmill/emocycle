<main class="liste" [attr.aria-label]="'Émotions de la famille ' + familleLabel()">

  <header class="liste__header">
    <h1 class="liste__titre">{{ familleLabel() }}</h1>
  </header>

  <nav class="liste__nav" aria-label="Liste des émotions">
    @for (emotion of emotions(); track emotion.id) {
      <button
        class="liste__item"
        [attr.aria-label]="'Choisir ' + emotion.name"
        (click)="onEmotionSelect(emotion)"
      >
        {{ emotion.name }}
      </button>
    } @empty {
      <p class="liste__vide">Aucune émotion trouvée.</p>
    }
  </nav>

</main>
